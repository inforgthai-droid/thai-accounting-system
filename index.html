<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบบัญชี & POS Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f0f4f8;color:#1e293b;font-size:14px;height:100vh;overflow:hidden;display:flex}
:root{--primary:#1a3a5c;--accent:#0ea5e9;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--border:#e2e8f0;--muted:#64748b;--text:#1e293b}
#loading-overlay{position:fixed;inset:0;background:var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#loading-overlay.hidden{opacity:0;pointer-events:none}
.ld-logo{font-size:52px;margin-bottom:12px;animation:pulse 1.5s infinite}
.ld-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:6px}
.ld-sub{color:rgba(255,255,255,.55);font-size:13px;margin-bottom:20px}
.ld-bar{width:220px;height:4px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden}
.ld-bar-inner{height:100%;background:var(--accent);border-radius:99px;animation:loadbar 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes loadbar{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
#toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;z-index:9998;opacity:0;transition:opacity .3s;pointer-events:none;max-width:320px}
#toast.show{opacity:1}
#toast.success{background:#10b981}
#toast.error{background:#ef4444}
#toast.info{background:#0ea5e9}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:8000;display:none;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
#modal-box{background:#fff;border-radius:16px;padding:1.5rem;width:90%;max-width:600px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-size:17px;font-weight:700;color:var(--primary);margin-bottom:1rem;padding-bottom:8px;border-bottom:2px solid var(--accent)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
@media print{body>*:not(#print-area){display:none!important}#print-area{display:block!important;position:fixed;inset:0;background:#fff;padding:20px}}
#print-area{display:none}
#sidebar{width:230px;background:var(--primary);color:#fff;display:flex;flex-direction:column;transition:width .2s;overflow:hidden;flex-shrink:0}
#sidebar.collapsed{width:60px}
.sb-header{padding:.9rem 1rem;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:8px}
.sb-title{font-size:14px;font-weight:700;white-space:nowrap}
#sidebar.collapsed .sb-title,#sidebar.collapsed .sb-info,#sidebar.collapsed .sb-footer,#sidebar.collapsed .nav-label,#sidebar.collapsed .nav-group{opacity:0;pointer-events:none;width:0;overflow:hidden}
.sb-info{padding:.5rem 1rem;font-size:11px;color:rgba(255,255,255,.55);border-bottom:1px solid rgba(255,255,255,.1)}
.sb-info strong{color:#fff;font-size:12px;display:block;margin-bottom:2px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block;margin-right:4px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
nav{flex:1;padding:.4rem 0;overflow-y:auto}
.nav-group{padding:6px 14px 2px;font-size:10px;color:rgba(255,255,255,.35);font-weight:700;letter-spacing:.06em;white-space:nowrap}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 16px;background:none;border:none;color:#fff;cursor:pointer;font-size:13px;font-family:'Sarabun',sans-serif;text-align:left;border-left:3px solid transparent;transition:background .13s}
.nav-btn:hover{background:rgba(255,255,255,.07)}
.nav-btn.active{background:rgba(255,255,255,.14);border-left-color:var(--accent);font-weight:700}
.nav-icon{font-size:15px;flex-shrink:0}
.nav-label{white-space:nowrap}
.sb-footer{padding:.9rem 1rem;font-size:11px;color:rgba(255,255,255,.35);border-top:1px solid rgba(255,255,255,.08)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#fff;border-bottom:1px solid var(--border);padding:.7rem 1.4rem;display:flex;align-items:center;justify-content:space-between;gap:8px}
#topbar-title{font-weight:700;color:var(--primary);font-size:15px}
.tb-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
#content{flex:1;overflow-y:auto;padding:1.4rem}
.page{display:none}
.page.active{display:block}
.card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:1.2rem;margin-bottom:1rem}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:11px;margin-bottom:1.4rem}
.stat-card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:.95rem 1.1rem}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:3px}
.stat-value{font-size:21px;font-weight:700}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px}
.sec-title{font-size:17px;font-weight:700;color:var(--primary);margin-bottom:1rem;padding-bottom:7px;border-bottom:2px solid var(--accent)}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
.badge-blue{background:#eff6ff;color:#1d4ed8}.badge-green{background:#f0fdf4;color:#166534}
.badge-red{background:#fef2f2;color:#991b1b}.badge-amber{background:#fffbeb;color:#92400e}
.badge-gray{background:#f8fafc;color:#475569}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.88}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}
.btn-danger{background:var(--danger)}.btn-success{background:var(--success)}
.btn-gray{background:var(--muted)}.btn-primary{background:var(--primary)}
.btn-purple{background:#7c3aed}.btn-warning{background:var(--warning)}
.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fm{margin-bottom:8px}
.fl{font-size:12px;color:var(--muted);margin-bottom:3px;font-weight:600;display:block}
.fc{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'Sarabun',sans-serif;color:var(--text);background:#fff}
.fc:focus{outline:none;border-color:var(--accent)}
.tbl{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f1f5f9}
th{padding:7px 9px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;text-align:right}
th:first-child{text-align:left}
td{padding:7px 9px;border-bottom:1px solid var(--border);color:var(--text);text-align:right;vertical-align:middle}
td:first-child{text-align:left}
tbody tr:nth-child(even){background:#fafafa}
tbody tr:hover{background:#f0f9ff}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.pos-wrap{display:grid;grid-template-columns:1fr 380px;gap:1rem;height:calc(100vh - 130px)}
.pos-left{overflow-y:auto}
.pos-right{background:#fff;border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.pos-cart-header{padding:1rem;border-bottom:1px solid var(--border);font-weight:700;color:var(--primary);font-size:15px;display:flex;justify-content:space-between;align-items:center}
.pos-cart-items{flex:1;overflow-y:auto;padding:.5rem}
.cart-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;background:#fff}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:#f1f5f9;cursor:pointer;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center}
.qty-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.pos-summary{padding:1rem;border-top:1px solid var(--border);background:#f8fafc}
.pos-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding-bottom:1rem}
.product-card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:.9rem .8rem;cursor:pointer;transition:all .13s;text-align:center}
.product-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(14,165,233,.15);transform:translateY(-1px)}
.product-card.out{opacity:.5;cursor:not-allowed;pointer-events:none}
.product-name{font-weight:700;font-size:12px;margin-bottom:3px;color:var(--primary)}
.product-price{font-size:14px;font-weight:700;color:var(--success)}
</style>
</head>
<body>
<div id="loading-overlay"><div class="ld-logo">🏪</div><div class="ld-title">ระบบบัญชี & POS Pro</div><div class="ld-sub">กำลังเชื่อมต่อ Firebase...</div><div class="ld-bar"><div class="ld-bar-inner"></div></div></div>
<div id="toast"></div>
<div id="modal-overlay"><div id="modal-box"><div class="modal-title" id="modal-title"></div><div id="modal-body"></div><div class="modal-footer" id="modal-footer"></div></div></div>
<div id="print-area"></div>
<div id="sidebar">
  <div class="sb-header">
    <button onclick="toggleSB()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0;line-height:1">☰</button>
    <div class="sb-title">🏪 ระบบบัญชี & POS</div>
  </div>
  <div class="sb-info"><strong id="sb-name">กำลังโหลด...</strong><span><span class="sync-dot"></span>Firebase Live</span></div>

</div>
<div id="main">
  <div id="topbar">
    <div id="topbar-title">📊 ภาพรวม</div>
    <div class="tb-right"><span class="badge badge-green">🔥 Firebase</span><button class="btn btn-gray btn-sm" onclick="window.print()">🖨️ พิมพ์</button></div>
  </div>
  <div id="content">
    <div id="p-dashboard" class="page active"></div>

    <div id="p-invoice" class="page"></div>
    <div id="p-vat" class="page"></div>
    <div id="p-payroll" class="page"></div>
    <div id="p-financial" class="page"></div>
    <div id="p-taxforms" class="page"></div>
    <div id="p-customers" class="page"></div>
    <div id="p-suppliers" class="page"></div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyCttc2r7PnKnI8dZDGGPuvJWqvib0UMjLc",authDomain:"thai-accounting-d3e6b.firebaseapp.com",projectId:"thai-accounting-d3e6b",storageBucket:"thai-accounting-d3e6b.firebasestorage.app",messagingSenderId:"227660326618",appId:"1:227660326618:web:dfc27778e1eadb519fe7e3"});
const db=firebase.firestore();
const S={company:{name:"บริษัท ตัวอย่าง จำกัด",taxId:"0105566012345",address:"123 ถนนสุขุมวิท กรุงเทพฯ 10110",tel:"02-123-4567",accountingYear:"2567",vatRate:7},products:[],suppliers:[],customers:[],purchases:[],sales:[],journals:[],invoices:[],vatPurchase:[],employees:[],cart:[],posDiscount:0,posNote:''};
const SEED={
  products:[{code:'P001',name:'กระดาษ A4',unit:'รีม',cost:95,price:120,stock:50,minStock:10,category:'เครื่องเขียน'},{code:'P002',name:'ปากกาลูกลื่น',unit:'ด้าม',cost:8,price:15,stock:100,minStock:20,category:'เครื่องเขียน'},{code:'P003',name:'แฟ้มเอกสาร',unit:'อัน',cost:35,price:55,stock:30,minStock:5,category:'อุปกรณ์'},{code:'P004',name:'หมึกพิมพ์',unit:'กล่อง',cost:450,price:650,stock:8,minStock:3,category:'คอมพิวเตอร์'}],
  suppliers:[{code:'S001',name:'บริษัท ออฟฟิศเมท จำกัด',taxId:'0105555001234',tel:'02-111-2222',address:'10 ถ.พระราม 9 กรุงเทพฯ',contact:'คุณสมชาย',credit:30},{code:'S002',name:'ร้านวัสดุ ABC',taxId:'',tel:'02-333-4444',address:'20 ถ.ลาดพร้าว',contact:'คุณสมหญิง',credit:15}],
  customers:[{code:'C001',name:'บริษัท ABC จำกัด',taxId:'0105555001234',tel:'02-456-7890',address:'10 ถ.พระราม 9',credit:30,balance:0},{code:'C002',name:'ห้างหุ้นส่วน XYZ',taxId:'0103556002345',tel:'02-789-0123',address:'20 ถ.รัชดา',credit:45,balance:0}],
  employees:[{code:'E001',name:'นางสาว สมหญิง ดีใจ',position:'ผู้จัดการ',salary:45000,tax:2500,sso:750},{code:'E002',name:'นาย สมชาย รักงาน',position:'พนักงานขาย',salary:25000,tax:500,sso:750}],
};
const ts=()=>firebase.firestore.FieldValue.serverTimestamp();
const inc=n=>firebase.firestore.FieldValue.increment(n);
async function addFB(col,data){return (await db.collection(col).add({...data,createdAt:ts()})).id;}
async function updateFB(col,id,data){await db.collection(col).doc(id).update({...data,updatedAt:ts()});}
async function deleteFB(col,id){await db.collection(col).doc(id).delete();}
async function loadCol(col){
  try{const s=await db.collection(col).orderBy('createdAt','asc').get();return s.docs.map(d=>({id:d.id,...d.data()}));}
  catch{const s=await db.collection(col).get();return s.docs.map(d=>({id:d.id,...d.data()}));}
}
async function nextNo(prefix,col){
  const s=await db.collection(col).orderBy('createdAt','desc').limit(1).get();
  if(s.empty)return prefix+'-0001';
  const last=s.docs[0].data().docNo||'';
  return prefix+'-'+String((parseInt(last.split('-').pop())||0)+1).padStart(4,'0');
}
async function seedAll(){
  for(const[col,items]of Object.entries(SEED)){
    const s=await db.collection(col).limit(1).get();
    if(s.empty){const b=db.batch();items.forEach(x=>{const r=db.collection(col).doc();b.set(r,{...x,createdAt:ts()});});await b.commit();}
  }
  const sd=await db.collection('settings').doc('company').get();
  if(!sd.exists)await db.collection('settings').doc('company').set(S.company);
}
async function initApp(){
  try{
    await seedAll();
    const[products,suppliers,customers,purchases,sales,journals,invoices,vatPurchase,employees]=await Promise.all([loadCol('products'),loadCol('suppliers'),loadCol('customers'),loadCol('purchases'),loadCol('sales'),loadCol('journals'),loadCol('invoices'),loadCol('vatPurchase'),loadCol('employees')]);
    const cd=await db.collection('settings').doc('company').get();
    if(cd.exists)Object.assign(S.company,cd.data());
    Object.assign(S,{products,suppliers,customers,purchases,sales,journals,invoices,vatPurchase,employees});
    document.getElementById('sb-name').textContent=S.company.name;
    document.getElementById('loading-overlay').classList.add('hidden');
    buildNav();renderPage('dashboard');toast('เชื่อมต่อ Firebase สำเร็จ ✓','success');
  }catch(e){document.getElementById('loading-overlay').classList.add('hidden');toast('Error: '+e.message,'error');buildNav();renderPage('dashboard');}
}
const fmt=n=>new Intl.NumberFormat('th-TH').format(Math.round(n||0));
const fmtM=n=>new Intl.NumberFormat('th-TH',{minimumFractionDigits:2}).format(n||0);
const badge=(t,c)=>`<span class="badge badge-${c}">${t}</span>`;
const todayISO=()=>new Date().toISOString().split('T')[0];
const todayTH=()=>new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
function toast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`show ${type}`;clearTimeout(t._t);t._t=setTimeout(()=>t.className='',3200);}
function tbl(headers,rows,empty='ไม่มีข้อมูล'){
  if(!rows.length)return`<div style="text-align:center;padding:2rem;color:var(--muted)"><div style="font-size:36px;margin-bottom:8px">📂</div>${empty}</div>`;
  const ths=headers.map((h,i)=>`<th${i>0?' style="text-align:right"':''}>${h}</th>`).join('');
  const trs=rows.map(row=>`<tr>${row.map((c,ci)=>`<td${ci>0?' style="text-align:right"':''}>${c??''}</td>`).join('')}</tr>`).join('');
  return`<div class="tbl"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
}
function sc(label,value,color,sub=''){return`<div class="stat-card"><div class="stat-label">${label}</div><div class="stat-value" style="color:${color}">${value}</div>${sub?`<div class="stat-sub">${sub}</div>`:''}</div>`;}
function openModal(title,body,footer=''){document.getElementById('modal-title').innerHTML=title;document.getElementById('modal-body').innerHTML=body;document.getElementById('modal-footer').innerHTML=footer||`<button class="btn btn-gray" onclick="closeModal()">ปิด</button>`;document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target.id==='modal-overlay')closeModal();});
const MENU=[
  {g:'ร้านค้า'},{key:'dashboard',label:'ภาพรวม',icon:'📊'},{key:'pos',label:'ขายหน้าร้าน (POS)',icon:'🛒'},{key:'sales',label:'ประวัติการขาย',icon:'📑'},
  {g:'สินค้า & คลัง'},{key:'products',label:'รายการสินค้า',icon:'📦'},{key:'stock',label:'สต็อกสินค้า',icon:'🏭'},{key:'purchases',label:'ซื้อสินค้าเข้า',icon:'🚚'},
  {g:'ผู้ติดต่อ'},{key:'customers',label:'ลูกค้า',icon:'🏢'},{key:'suppliers',label:'ซัพพลายเออร์',icon:'🏗️'},
  {g:'บัญชี & ภาษี'},{key:'journal',label:'สมุดรายวัน',icon:'📒'},{key:'invoice',label:'ใบแจ้งหนี้',icon:'🧾'},{key:'vat',label:'ภาษี VAT',icon:'📋'},{key:'payroll',label:'เงินเดือน',icon:'👥'},{key:'financial',label:'งบการเงิน',icon:'📈'},{key:'taxforms',label:'แบบฟอร์มภาษี',icon:'🏛️'},
];
let currentPage='dashboard',sidebarOpen=true;
function buildNav(){document.getElementById('nav').innerHTML=MENU.map(m=>m.g?`<div class="nav-group">${m.g}</div>`:`<button class="nav-btn${currentPage===m.key?' active':''}" onclick="navigate('${m.key}')"><span class="nav-icon">${m.icon}</span><span class="nav-label">${m.label}</span></button>`).join('');}
function navigate(key){currentPage=key;document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('p-'+key).classList.add('active');const m=MENU.find(x=>x.key===key);document.getElementById('topbar-title').textContent=(m?.icon||'')+' '+(m?.label||'');buildNav();renderPage(key);}
function toggleSB(){sidebarOpen=!sidebarOpen;document.getElementById('sidebar').classList.toggle('collapsed',!sidebarOpen);}
function renderPage(key){const el=document.getElementById('p-'+key);if(!el)return;const map={dashboard:renderDashboard,pos:renderPOS,sales:renderSales,products:renderProducts,stock:renderStock,purchases:renderPurchases,customers:renderCustomers,suppliers:renderSuppliers,journal:renderJournal,invoice:renderInvoice,vat:renderVat,payroll:renderPayroll,financial:renderFinancial,taxforms:renderTaxForms};if(map[key])el.innerHTML=map[key]();}

// ===== DASHBOARD =====
function renderDashboard(){
  const todSales=S.sales.filter(s=>s.date===todayISO());
  const todTotal=todSales.reduce((a,b)=>a+(b.total||0),0);
  const allRev=S.sales.reduce((a,b)=>a+(b.subtotal||0),0);
  const allCost=S.sales.reduce((a,b)=>a+(b.totalCost||0),0);
  const profit=allRev-allCost;
  const lowStock=S.products.filter(p=>(p.stock||0)<=(p.minStock||5)&&p.stock>0);
  const outStock=S.products.filter(p=>p.stock<=0);
  return`<div class="sec-title">📊 ภาพรวม — ${todayTH()}</div>
  <div class="stat-grid">
    ${sc('ยอดขายวันนี้','฿'+fmt(todTotal),'#0ea5e9',todSales.length+' รายการ')}
    ${sc('รายได้รวม','฿'+fmt(allRev),'#10b981',S.sales.length+' บิล')}

  const cartHTML=S.cart.length?S.cart.map((item,i)=>`
    <div class="cart-item">
      <div style="flex:1">
        <div style="font-weight:700;font-size:13px">${item.name}</div>

        <div style="font-size:11px;color:#7c3aed">กำไร ฿${fmt((item.price-item.cost)*item.qty)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:5px">
        <button class="qty-btn" onclick="cartQty(${i},-1)">−</button>
        <input type="number" value="${item.qty}" min="1" max="${item.stock}" onchange="cartSetQty(${i},this.value)"

        <button class="qty-btn" onclick="cartQty(${i},1)">+</button>

      </div>
      <div style="font-weight:700;color:var(--primary);min-width:70px;text-align:right;margin-left:6px">฿${fmt(item.price*item.qty)}</div>
    </div>`).join(''):'<div style="text-align:center;padding:2rem;color:var(--muted)">🛒 เพิ่มสินค้าจากด้านซ้าย</div>';
  const sub=S.cart.reduce((a,b)=>a+b.price*b.qty,0);
  const totalCost=S.cart.reduce((a,b)=>a+b.cost*b.qty,0);
  const disc=parseFloat(S.posDiscount)||0;
  const discAmt=disc>0?(disc<=100?sub*disc/100:disc):0;
  const vat=Math.round((sub-discAmt)*S.company.vatRate/100);
  const total=sub-discAmt+vat;
  return`<div class="pos-wrap">
    <div class="pos-left">
      <div class="card" style="padding:.8rem;margin-bottom:.8rem">
        <input class="fc" placeholder="🔍 ค้นหาสินค้า ชื่อ หรือ รหัส..." value="${q}"
          oninput="S._posQ=this.value;renderPage('pos')" style="font-size:14px">
      </div>
      <div class="product-grid">
        ${prods.map(p=>`<div class="product-card${p.stock<=0?' out':''}" onclick="${p.stock>0?`addToCart('${p.id}')`:''}">
          <div style="font-size:28px;margin-bottom:6px">📦</div>
          <div class="product-name">${p.name}</div>
          <div style="font-size:10px;color:var(--muted);margin-bottom:4px">${p.code}</div>
          <div class="product-price">฿${fmt(p.price)}</div>
          <div style="font-size:11px;color:var(--muted)">${p.stock<=0?'<span style="color:var(--danger)">หมดสต็อก</span>':'เหลือ '+p.stock+' '+p.unit}</div>
        </div>`).join('')||'<div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--muted)">ไม่พบสินค้า</div>'}
      </div>
    </div>
    <div class="pos-right">
      <div class="pos-cart-header"><span>🛒 ตะกร้า (${S.cart.length} รายการ)</span>
        <button class="btn btn-danger btn-xs" onclick="cartClear()">ล้าง</button></div>
      <div class="pos-cart-items">${cartHTML}</div>
      <div class="pos-summary">
        <div class="pos-row"><span>ยอดรวม</span><span>฿${fmt(sub)}</span></div>
        <div class="pos-row" style="align-items:center">
          <span>ส่วนลด</span>
          <div style="display:flex;gap:4px;align-items:center">
            <input type="number" value="${S.posDiscount}" min="0" onchange="S.posDiscount=this.value;renderPage('pos')"
              style="width:55px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:3px 4px;font-size:12px;font-family:'Sarabun',sans-serif">
            <span style="font-size:11px;color:var(--muted)">${disc>0&&disc<=100?'%':'฿'}</span>
            <span style="color:var(--danger);font-weight:600">-฿${fmt(discAmt)}</span>
          </div>
        </div>
        <div class="pos-row"><span>VAT ${S.company.vatRate}%</span><span>฿${fmt(vat)}</span></div>
        <div class="pos-row" style="font-size:20px;font-weight:700;color:var(--primary);margin:6px 0"><span>ยอดสุทธิ</span><span>฿${fmt(total)}</span></div>
        <div class="pos-row" style="color:#7c3aed;font-weight:700;margin-bottom:8px"><span>กำไรขั้นต้น</span><span>฿${fmt(sub-discAmt-totalCost)}</span></div>
        <div style="margin-bottom:8px">
          <label class="fl">ลูกค้า / หมายเหตุ</label>
          <input class="fc" value="${S.posNote}" onchange="S.posNote=this.value" placeholder="ลูกค้าทั่วไป">
        </div>
        <button class="btn btn-success" style="width:100%;font-size:15px;padding:12px;border-radius:10px"
          onclick="checkout()" ${S.cart.length?'':'disabled'}>💳 ชำระเงิน ฿${fmt(total)}</button>
      </div>
    </div>
  </div>`;
}
function addToCart(pid){
  const p=S.products.find(x=>x.id===pid);if(!p||p.stock<=0)return;
  const ex=S.cart.find(x=>x.pid===pid);
  if(ex){if(ex.qty<p.stock)ex.qty++;else{toast('สินค้าไม่เพียงพอ!','error');return;}}
  else S.cart.push({pid,code:p.code,name:p.name,unit:p.unit,price:p.price,cost:p.cost,stock:p.stock,qty:1});
  renderPage('pos');
}
function cartQty(i,d){const item=S.cart[i];item.qty=Math.max(1,Math.min(item.stock,item.qty+d));renderPage('pos');}
function cartSetQty(i,v){S.cart[i].qty=Math.max(1,Math.min(S.cart[i].stock,parseInt(v)||1));renderPage('pos');}
function cartRemove(i){S.cart.splice(i,1);renderPage('pos');}
function cartClear(){S.cart=[];S.posDiscount=0;S.posNote='';renderPage('pos');}
async function checkout(){
  if(!S.cart.length)return;
  const sub=S.cart.reduce((a,b)=>a+b.price*b.qty,0);
  const totalCost=S.cart.reduce((a,b)=>a+b.cost*b.qty,0);
  const disc=parseFloat(S.posDiscount)||0;
  const discAmt=disc>0?(disc<=100?sub*disc/100:disc):0;
  const vat=Math.round((sub-discAmt)*S.company.vatRate/100);
  const total=sub-discAmt+vat;
  const docNo=await nextNo('POS','sales');
  const saleData={docNo,date:todayISO(),customerName:S.posNote||'ลูกค้าทั่วไป',
    items:S.cart.map(x=>({pid:x.pid,code:x.code,name:x.name,unit:x.unit,price:x.price,cost:x.cost,qty:x.qty,subtotal:x.price*x.qty})),
    subtotal:sub,discount:discAmt,vat,total,totalCost,profit:sub-discAmt-totalCost};
  try{
    const batch=db.batch();
    const sRef=db.collection('sales').doc();
    batch.set(sRef,{...saleData,createdAt:ts()});
    S.cart.forEach(item=>batch.update(db.collection('products').doc(item.pid),{stock:inc(-item.qty)}));
    await batch.commit();
    S.sales.push({id:sRef.id,...saleData});
    S.cart.forEach(item=>{const p=S.products.find(x=>x.id===item.pid);if(p)p.stock-=item.qty;});
    toast('บันทึกการขาย '+docNo+' สำเร็จ ✓','success');
    const rec={id:sRef.id,...saleData};
    cartClear();printReceipt(rec);
  }catch(e){toast('Error: '+e.message,'error');}
}

function addPI(){
  const sel=document.getElementById('purProd');const pid=sel.value;if(!pid)return;
  const p=S.products.find(x=>x.id===pid);if(!p)return;
  if(PI.find(x=>x.pid===pid)){toast('มีสินค้านี้แล้ว','error');return;}
  PI.push({pid,code:p.code,name:p.name,unit:p.unit,cost:p.cost,qty:1});
  renderPage('purchases');
}
function piQty(i,v){PI[i].qty=Math.max(1,parseInt(v)||1);renderPage('purchases');}
function piCost(i,v){PI[i].cost=parseFloat(v)||0;renderPage('purchases');}
function piRemove(i){PI.splice(i,1);renderPage('purchases');}
async function savePurchase(){
  if(!PI.length)return;
  const supId=document.getElementById('purSup').value;
  const sup=S.suppliers.find(x=>x.id===supId);
  const total=PI.reduce((a,b)=>a+b.qty*b.cost,0);
  const docNo=await nextNo('PO','purchases');
  const data={docNo,date:document.getElementById('purDate').value,supplierName:sup?sup.name:'ไม่ระบุ',supplierId:supId,note:document.getElementById('purNote').value,items:PI.map(x=>({...x})),total,status:'เสร็จสิ้น'};
  try{
    const batch=db.batch();
    const pRef=db.collection('purchases').doc();
    batch.set(pRef,{...data,createdAt:ts()});
    PI.forEach(item=>batch.update(db.collection('products').doc(item.pid),{stock:inc(item.qty),cost:item.cost}));
    await batch.commit();
    S.purchases.push({id:pRef.id,...data});
    PI.forEach(item=>{const p=S.products.find(x=>x.id===item.pid);if(p){p.stock+=item.qty;p.cost=item.cost;}});
    PI=[];renderPage('purchases');toast('บันทึก '+docNo+' สำเร็จ ✓','success');
  }catch(e){toast('Error: '+e.message,'error');}
}
function viewPurchase(id){
  const p=S.purchases.find(x=>x.id===id);if(!p)return;
  const rows=p.items?p.items.map((i,idx)=>`<tr><td>${idx+1}</td><td style="text-align:left">${i.code}</td><td style="text-align:left">${i.name}</td><td style="text-align:right">${i.qty} ${i.unit}</td><td style="text-align:right">฿${fmt(i.cost)}</td><td style="text-align:right;font-weight:600">฿${fmt(i.qty*i.cost)}</td></tr>`).join(''):'';

async function saveInvoice(id){
  const amt=parseFloat(document.getElementById('iAmt').value)||0;
  const data={no:document.getElementById('iNo').value,date:document.getElementById('iDate').value,customer:document.getElementById('iCust').value,desc:document.getElementById('iDesc').value,amount:amt,vat:Math.round(amt*S.company.vatRate/100),total:Math.round(amt*(1+S.company.vatRate/100)),status:id?(S.invoices.find(x=>x.id===id)?.status||'รอชำระ'):'รอชำระ'};
  if(!data.no||!data.amount){toast('กรุณากรอกเลขที่และจำนวน','error');return;}
  if(id){await updateFB('invoices',id,data);const i=S.invoices.findIndex(x=>x.id===id);S.invoices[i]={...S.invoices[i],...data};}
  else{const nid=await addFB('invoices',data);S.invoices.push({id:nid,...data});}
  closeModal();renderPage('invoice');toast('บันทึกสำเร็จ ✓','success');
}
async function payInvoice(id){await updateFB('invoices',id,{status:'ชำระแล้ว'});const inv=S.invoices.find(x=>x.id===id);if(inv)inv.status='ชำระแล้ว';renderPage('invoice');toast('รับชำระสำเร็จ ✓','success');}
async function deleteInvoice(id){if(!confirm('ลบ?'))return;await deleteFB('invoices',id);S.invoices=S.invoices.filter(x=>x.id!==id);renderPage('invoice');toast('ลบแล้ว','info');}

// ===== VAT =====
function renderVat(){
  const vs=S.invoices.reduce((a,b)=>a+(b.vat||0),0);
  const vb=S.vatPurchase.reduce((a,b)=>a+(b.vat||0),0);
  return`<div class="sec-title">📋 ภาษีมูลค่าเพิ่ม (VAT)</div>
  <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
    ${sc('ภาษีขาย','฿'+fmt(vs),'#10b981')}${sc('ภาษีซื้อ','฿'+fmt(vb),'#f59e0b')}
    ${sc('ภาษีสุทธิ','฿'+fmt(vs-vb),vs-vb>0?'#ef4444':'#10b981',vs-vb>0?'ต้องชำระ':'ขอคืน')}
  </div>
  <div class="card" style="background:#f0fdf4">
    <div style="font-weight:700;color:var(--primary);margin-bottom:10px">สรุป ภ.พ.30</div>
    ${[['มูลค่าฐานภาษีขาย',S.invoices.reduce((a,b)=>a+(b.amount||0),0)],['ภาษีขาย (Output Tax)',vs],['มูลค่าฐานภาษีซื้อ',S.vatPurchase.reduce((a,b)=>a+(b.amount||0),0)],['ภาษีซื้อ (Input Tax)',vb],['ภาษีสุทธิที่ต้องนำส่ง',vs-vb]]
      .map(([k,v],i)=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #d1fae5;font-size:14px${i===4?';font-weight:700':''}"><span style="color:var(--muted)">${k}</span><span style="color:${i===4?'var(--danger)':'var(--primary)'};font-weight:700">฿${fmtM(v)}</span></div>`).join('')}
  </div>`;
}

// ===== PAYROLL =====
function renderPayroll(){
  const ts2=S.employees.reduce((a,b)=>a+(b.salary||0),0);
  const tt=S.employees.reduce((a,b)=>a+(b.tax||0),0);
  const tss=S.employees.reduce((a,b)=>a+(b.sso||0),0);
  const rows=S.employees.map(e=>[e.code||'',e.name,e.position,'฿'+fmt(e.salary),'฿'+fmt(e.tax),'฿'+fmt(e.sso),'฿'+fmt((e.salary||0)-(e.tax||0)-(e.sso||0)),
    `<button class="btn btn-primary btn-xs" onclick="editEmployee('${e.id}')">แก้ไข</button> <button class="btn btn-danger btn-xs" onclick="deleteEmployee('${e.id}')">ลบ</button>`]);
  return`<div class="sec-title">👥 เงินเดือนพนักงาน</div>
  <div style="display:flex;justify-content:flex-end;margin-bottom:1rem"><button class="btn" onclick="editEmployee()">+ เพิ่มพนักงาน</button></div>
  <div class="stat-grid" style="grid-template-columns:repeat(4,1fr)">
    ${sc('พนักงาน',S.employees.length+' คน','#1a3a5c')}${sc('เงินเดือนรวม','฿'+fmt(ts2),'#0ea5e9')}
    ${sc('ภาษีหัก','฿'+fmt(tt),'#f59e0b')}${sc('ประกันสังคม','฿'+fmt(tss),'#ef4444')}
  </div>
  ${tbl(['รหัส','ชื่อ-สกุล','ตำแหน่ง','เงินเดือน','ภาษีหัก','ประกัน','สุทธิ',''],rows)}`;
}
function empForm(e={}){return`<div class="fg">
  <div class="fm"><label class="fl">รหัสพนักงาน</label><input class="fc" id="eCode" value="${e.code||''}"></div>
  <div class="fm"><label class="fl">ชื่อ-สกุล *</label><input class="fc" id="eName" value="${e.name||''}"></div>
  <div class="fm"><label class="fl">ตำแหน่ง</label><input class="fc" id="ePos" value="${e.position||''}"></div>
  <div class="fm"><label class="fl">เงินเดือน (฿)</label><input type="number" class="fc" id="eSal" value="${e.salary||''}"></div>
  <div class="fm"><label class="fl">ภาษีหัก ณ ที่จ่าย (฿)</label><input type="number" class="fc" id="eTax" value="${e.tax||''}"></div>
  <div class="fm"><label class="fl">ประกันสังคม (฿)</label><input type="number" class="fc" id="eSSO" value="${e.sso||750}"></div>
</div>`;}
function editEmployee(id){const e=id?S.employees.find(x=>x.id===id):{};openModal(id?'✏️ แก้ไขพนักงาน':'➕ เพิ่มพนักงาน',empForm(e||{}),`<button class="btn btn-gray" onclick="closeModal()">ยกเลิก</button><button class="btn" onclick="saveEmployee('${id||''}')">บันทึก</button>`);}
async function saveEmployee(id){
  const data={code:document.getElementById('eCode').value,name:document.getElementById('eName').value,position:document.getElementById('ePos').value,salary:parseFloat(document.getElementById('eSal').value)||0,tax:parseFloat(document.getElementById('eTax').value)||0,sso:parseFloat(document.getElementById('eSSO').value)||750};
  if(!data.name){toast('กรุณากรอกชื่อ','error');return;}
  if(id){await updateFB('employees',id,data);const i=S.employees.findIndex(x=>x.id===id);S.employees[i]={...S.employees[i],...data};}
  else{const nid=await addFB('employees',data);S.employees.push({id:nid,...data});}
  closeModal();renderPage('payroll');toast('บันทึกสำเร็จ ✓','success');
}
async function deleteEmployee(id){if(!confirm('ลบ?'))return;await deleteFB('employees',id);S.employees=S.employees.filter(x=>x.id!==id);renderPage('payroll');toast('ลบแล้ว','info');}

// ===== FINANCIAL =====
function renderFinancial(){
  const posRev=S.sales.reduce((a,b)=>a+(b.subtotal||0),0);
  const invRev=S.invoices.reduce((a,b)=>a+(b.amount||0),0);
  const totRev=posRev+invRev;
  const cogs=S.sales.reduce((a,b)=>a+(b.totalCost||0),0);
  const salExp=S.employees.reduce((a,b)=>a+(b.salary||0),0)*2;
  const othExp=40000;
  const totExp=cogs+salExp+othExp;
  const net=totRev-totExp;
  return`<div class="sec-title">📈 งบการเงิน</div>
  <div class="two-col">
    <div class="card">
      <div style="text-align:center;margin-bottom:1rem"><b style="font-size:15px;color:var(--primary)">${S.company.name}</b><br><span style="color:var(--muted);font-size:12px">งบกำไรขาดทุน ปี ${S.company.accountingYear}</span></div>
      ${[{l:'รายได้จากการขาย (POS)',v:posRev},{l:'รายได้จากใบแจ้งหนี้',v:invRev},{l:'รวมรายได้',v:totRev,b:true,c:'#10b981'},
         {l:'ต้นทุนสินค้าขาย',v:cogs,neg:true},{l:'เงินเดือน',v:salExp,neg:true},{l:'ค่าใช้จ่ายอื่น',v:othExp,neg:true},
         {l:'รวมค่าใช้จ่าย',v:totExp,b:true,c:'#ef4444',neg:true},
         {l:'กำไร (ขาดทุน) สุทธิ',v:net,b:true,c:net>0?'#10b981':'#ef4444',sz:16}]
        .map(r=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-weight:${r.b?700:400};font-size:${r.sz||13}px;color:${r.c||'var(--text)'}">
          <span>${r.l}</span><span>${r.neg?'-':''}฿${fmtM(r.v)}</span></div>`).join('')}
    </div>
    <div>
      ${sc('รายได้รวม','฿'+fmt(totRev),'#10b981')}
      <div style="margin:8px 0"></div>
      ${sc('ต้นทุน+ค่าใช้จ่าย','฿'+fmt(totExp),'#ef4444')}
      <div style="margin:8px 0"></div>
      ${sc('กำไรสุทธิ','฿'+fmt(net),net>0?'#7c3aed':'#ef4444',fmtM(totRev?net/totRev*100:0)+'%')}
      <div style="margin:8px 0"></div>
      ${sc('อัตรากำไรขั้นต้น',fmtM(posRev?((posRev-cogs)/posRev)*100:0)+'%','#0ea5e9','จากการขายหน้าร้าน')}
    </div>
  </div>`;
}

// ===== TAX FORMS =====
function renderTaxForms(){
  const vs=S.invoices.reduce((a,b)=>a+(b.vat||0),0);
  const vb=S.vatPurchase.reduce((a,b)=>a+(b.vat||0),0);
  const tt=S.employees.reduce((a,b)=>a+(b.tax||0),0);
  const rev=S.sales.reduce((a,b)=>a+(b.subtotal||0),0)+S.invoices.reduce((a,b)=>a+(b.amount||0),0);
  const exp=S.employees.reduce((a,b)=>a+(b.salary||0),0)*2+40000;
  const corp=Math.max(0,Math.round((rev-exp)*0.20));
  return`<div class="sec-title">🏛️ แบบฟอร์มภาษีสรรพากร</div>
  <div class="two-col">
    <div class="card">
      <b style="color:var(--primary)">ภ.พ.30 — ภาษีมูลค่าเพิ่ม</b>
      <div style="font-size:12px;color:var(--muted);margin:6px 0">ยื่นภายในวันที่ 15 ของเดือนถัดไป</div>
      ${[['ภาษีขาย',vs],['ภาษีซื้อ',vb],['ภาษีสุทธิ',vs-vb]].map(([k,v],i)=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">${k}</span><span style="font-weight:700;color:${i===2?'var(--danger)':'var(--primary)'}">฿${fmtM(v)}</span></div>`).join('')}
      <div style="margin-top:1rem;padding:.8rem;background:#fef2f2;border-radius:8px;text-align:center">
        <div style="font-size:12px;color:var(--muted)">ต้องนำส่ง</div>
        <div style="font-size:24px;font-weight:700;color:var(--danger)">฿${fmtM(vs-vb)}</div></div>
    </div>
    <div class="card">
      <b style="color:var(--primary)">ภ.ง.ด.50 — ภาษีนิติบุคคล (ประจำปี)</b>
      <div style="font-size:12px;color:var(--muted);margin:6px 0">ยื่นภายใน 150 วัน นับจากวันสิ้นรอบบัญชี</div>
      ${[['รายได้รวม',rev],['ค่าใช้จ่ายรวม',exp],['กำไรสุทธิ',rev-exp],['ภาษีนิติบุคคล 20%',corp]].map(([k,v],i)=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">${k}</span><span style="font-weight:700;color:${i===3?'var(--danger)':'var(--primary)'}">฿${fmtM(v)}</span></div>`).join('')}
    </div>
  </div>
  <div class="card" style="margin-top:1rem">
    <b style="color:var(--primary)">ภ.ง.ด.1 — ภาษีเงินได้หัก ณ ที่จ่าย (เงินเดือน)</b>
    <div style="font-size:12px;color:var(--muted);margin:6px 0 10px">ยื่นภายในวันที่ 7 ของเดือนถัดไป</div>
    ${tbl(['#','ชื่อ-สกุล','เงินได้','ภาษีหัก ณ ที่จ่าย'],S.employees.map((e,i)=>[i+1,e.name,'฿'+fmt(e.salary),'฿'+fmt(e.tax)]))}
    <div style="text-align:right;font-weight:700;margin-top:8px">รวมนำส่ง: <span style="color:var(--danger)">฿${fmtM(tt)}</span></div>
  </div>`;
}

// ===== START =====
initApp();
</script>
</body>
</html>
